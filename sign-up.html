<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/sign-up.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet"
    />
    <title>AncientKemet | Sign Up</title>
</head>
<body>

    <div class="card">

        <a href="index.html" class="back-link"><i class="fa-solid fa-house"></i></a>

        <!-- Title -->
        <div class="title">
            <h1>Ancient Kemet</h1>
            <p class="subtitle">Join the Archive</p>
        </div>

        <!-- id added so JS can find the form -->
        <form id="signup-form">

            <div class="field">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="name" />
                <span class="error-msg" id="name-error">Please enter your name.</span>
            </div>

            <div class="field">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="email" />
                <span class="error-msg" id="email-error">Please enter your email.</span>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="password" />
                <span class="error-msg" id="password-error">Please enter your password.</span>
            </div>

            <div class="field">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="confirm password" />
                <span class="error-msg" id="confirm-error">Passwords do not match.</span>
            </div>

            <button type="submit" class="signup-btn">Sign Up</button>

        </form>

        <div class="separator"></div>

        <p class="bottom-text">
            Have an Account? <a href="login.html">Login</a>
        </p>

    </div>

    <!-- scripts at the bottom so HTML is loaded before JS runs -->
    <script src="./js/sign-up.js"></script>
</body>
</html>
